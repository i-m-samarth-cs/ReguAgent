version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: reguagent
      POSTGRES_PASSWORD: reguagent_secret
      POSTGRES_DB: reguagent_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reguagent"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://reguagent:reguagent_secret@postgres:5432/reguagent_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: super_secret_key_for_demo_only_change_in_prod
      AI_MODE: mock
      CORS_ORIGINS: "http://localhost:3000"
    volumes:
      - ./backend:/app
      - ./prompts:/app/prompts
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed_data &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://reguagent:reguagent_secret@postgres:5432/reguagent_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: super_secret_key_for_demo_only_change_in_prod
      AI_MODE: mock
    volumes:
      - ./backend:/app
      - ./prompts:/app/prompts
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
